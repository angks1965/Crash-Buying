<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
const TICKERS = {
  SPX:  { label:'SPX',  name:'S&P 500 Index',           stooq:'^spx',    color:'#06B6D4', bg:'rgba(6,182,212,0.12)',   isIndex:true  },
  SPY:  { label:'SPY',  name:'SPDR S&P 500 ETF',        stooq:'spy.us',  color:'#3B82F6', bg:'rgba(59,130,246,0.12)'  },
  QQQ:  { label:'QQQ',  name:'Invesco Nasdaq-100 ETF',  stooq:'qqq.us',  color:'#A855F7', bg:'rgba(168,85,247,0.12)'  },
  VOO:  { label:'VOO',  name:'Vanguard S&P 500 ETF',    stooq:'voo.us',  color:'#22C55E', bg:'rgba(34,197,94,0.12)'   },
  URTH: { label:'URTH', name:'iShares MSCI World ETF',  stooq:'urth.us', color:'#F59E0B', bg:'rgba(245,158,11,0.12)'  },
};

// Loo Cheng Chuan's Crash-Buying allocation (Method 1)
// Draw down -10% → invest 10%, -15% → 15%, etc. Total = 100%
const DD_LEVELS = [
  { pct: -10, invest: 10 },
  { pct: -15, invest: 15 },
  { pct: -20, invest: 20 },
  { pct: -25, invest: 25 },
  { pct: -30, invest: 30 },
];

// Yahoo Finance symbol mapping (fallback data source)
const YF_SYMBOLS = {
  SPX:  '^GSPC',
  SPY:  'SPY',
  QQQ:  'QQQ',
  VOO:  'VOO',
  URTH: 'URTH',
};

const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${u}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
async function fetchWithProxy(url, isJson = false) {
  for (const makeProxy of PROXIES) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 10000);
      const res = await fetch(makeProxy(url), { signal: ctrl.signal });
      clearTimeout(tid);
      if (!res.ok) continue;
      if (isJson) {
        const json = await res.json();
        if (json) return json;
      } else {
        const text = await res.text();
        // Reject HTML error pages — valid CSV/data won't start with '<'
        if (text && !text.trimStart().startsWith('<') && text.includes(',') && text.length > 100) return text;
      }
    } catch { /* try next proxy */ }
  }
  throw new Error('All proxies failed');
}

function parseStooqCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) throw new Error('Empty CSV');
  // Validate header row contains expected columns
  const header = lines[0].toLowerCase();
  if (!header.includes('close')) throw new Error('Unexpected CSV format');
  return lines.slice(1).map(line => {
    const p = line.split(',');
    const close = parseFloat(p[4]);
    if (!p[0] || isNaN(close) || close <= 0) return null;
    return { date: p[0].trim(), close };
  }).filter(Boolean).sort((a,b) => a.date.localeCompare(b.date));
}

// Yahoo Finance v8 chart API — JSON format, no crumb needed for chart endpoint
async function fetchYahooFinance(ticker) {
  const sym = YF_SYMBOLS[ticker];
  if (!sym) throw new Error(`No Yahoo Finance symbol for ${ticker}`);
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=10y&interval=1d&includePrePost=false`;
  const json = await fetchWithProxy(url, true);
  const result = json?.chart?.result?.[0];
  if (!result) throw new Error('Yahoo Finance returned no result');
  const { timestamp, indicators } = result;
  const closes = indicators?.quote?.[0]?.close;
  if (!timestamp || !closes) throw new Error('Yahoo Finance missing price data');
  return timestamp.map((ts, i) => {
    const close = closes[i];
    if (!close || close <= 0) return null;
    const d = new Date(ts * 1000);
    const date = d.toISOString().slice(0, 10);
    return { date, close };
  }).filter(Boolean).sort((a, b) => a.date.localeCompare(b.date));
}

// Master fetch: Stooq primary → Yahoo Finance fallback
async function fetchPriceData(ticker, stooqSymbol, onStatus) {
  // ── Try Stooq ──
  try {
    onStatus('stooq');
    const url = `https://stooq.com/q/d/l/?s=${stooqSymbol}&i=d&d1=20150101`;
    const csv = await fetchWithProxy(url);
    const parsed = parseStooqCSV(csv);
    if (parsed.length > 50) return { data: parsed, source: 'Stooq' };
  } catch(e) {
    console.warn(`[${ticker}] Stooq failed (${e.message}), trying Yahoo Finance…`);
  }
  // ── Fallback: Yahoo Finance ──
  onStatus('yahoo');
  const parsed = await fetchYahooFinance(ticker);
  if (parsed.length > 50) return { data: parsed, source: 'Yahoo Finance' };
  throw new Error('Both data sources returned insufficient data');
}

const $  = n => (n == null ? '—' : '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}));
const u4 = n => (n == null ? '—' : n.toLocaleString('en-US',{minimumFractionDigits:4,maximumFractionDigits:4}));
const pct = n => (n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%');

/* ═══════════════════════════════════════════════════
   PRICE CHART
═══════════════════════════════════════════════════ */
function PriceChart({ data, peakPrice, triggerLevels, color, ticker }) {
  const svgRef = useRef(null);
  const [tip, setTip] = useState(null);

  const pts = useMemo(() => data.filter((_,i) => i % 5 === 0 || i === data.length-1), [data]);

  if (!pts.length) return null;

  const W=800, H=190, PL=56, PR=36, PT=14, PB=26;
  const iW = W-PL-PR, iH = H-PT-PB;
  const prices = pts.map(d => d.close);
  const lo = Math.min(...prices) * 0.96;
  const hi = Math.max(...prices) * 1.02;

  const xS = i => PL + (i/(pts.length-1))*iW;
  const yS = p => PT + ((hi-p)/(hi-lo))*iH;

  const linePath = pts.map((d,i) => `${i?'L':'M'} ${xS(i).toFixed(1)} ${yS(d.close).toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L ${xS(pts.length-1).toFixed(1)} ${H-PB} L ${PL} ${H-PB} Z`;

  // Nice y-axis labels
  const range = hi - lo;
  const rawStep = range / 5;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const step = Math.ceil(rawStep / mag) * mag;
  const yLabels = [];
  for (let p = Math.ceil(lo/step)*step; p <= hi; p += step) yLabels.push(p);

  // Year labels on x-axis
  const xLabels = [];
  let lastY = '';
  pts.forEach((d,i) => {
    const yr = d.date.slice(0,4);
    if (yr !== lastY) { xLabels.push({yr, x:xS(i)}); lastY = yr; }
  });

  const onMove = e => {
    const r = svgRef.current.getBoundingClientRect();
    const mx = (e.clientX - r.left) * (W/r.width) - PL;
    const idx = Math.max(0, Math.min(pts.length-1, Math.round((mx/iW)*(pts.length-1))));
    const d = pts[idx];
    const ddPct = peakPrice ? (d.close - peakPrice)/peakPrice*100 : null;
    setTip({ x: xS(idx), y: yS(d.close), date: d.date, close: d.close, dd: ddPct });
  };

  return (
    <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`}
      style={{ width:'100%', height:'auto', cursor:'crosshair', display:'block' }}
      onMouseMove={onMove} onMouseLeave={() => setTip(null)}>
      <defs>
        <linearGradient id={`g-${ticker}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0"    />
        </linearGradient>
        <clipPath id={`cp-${ticker}`}>
          <rect x={PL} y={PT} width={iW} height={iH} />
        </clipPath>
      </defs>

      {/* Grid + Y labels */}
      {yLabels.map(p => {
        const y = yS(p);
        if (y < PT || y > H-PB) return null;
        return <g key={p}>
          <line x1={PL} x2={W-PR} y1={y} y2={y} stroke="#DDE4EF" strokeWidth="1"/>
          <text x={PL-4} y={y+4} textAnchor="end" fill="#8FA3BC" fontSize="9.5" fontFamily="monospace">
            {p >= 1000 ? '$'+(p/1000).toFixed(1)+'k' : '$'+p.toFixed(0)}
          </text>
        </g>;
      })}

      {/* Area + Line */}
      <g clipPath={`url(#cp-${ticker})`}>
        <path d={areaPath} fill={`url(#g-${ticker})`}/>
        <path d={linePath}  fill="none" stroke={color} strokeWidth="1.5"/>
      </g>

      {/* ATH dashed line */}
      {peakPrice && peakPrice >= lo && peakPrice <= hi && (() => {
        const y = yS(peakPrice);
        return <>
          <line x1={PL} x2={W-PR} y1={y} y2={y} stroke="#B45309" strokeWidth="1" strokeDasharray="5,4" opacity="0.7"/>
          <text x={W-PR+3} y={y+4} fill="#B45309" fontSize="9" fontFamily="monospace">ATH</text>
        </>;
      })()}

      {/* Trigger level lines */}
      {triggerLevels.map(({pct:p, price}) => {
        if (!price || price < lo || price > hi) return null;
        const y = yS(price);
        const alpha = 0.35 + (Math.abs(p)/30)*0.45;
        const col = `rgba(239,68,68,${alpha})`;
        return <g key={p}>
          <line x1={PL} x2={W-PR} y1={y} y2={y} stroke={col} strokeWidth="0.8" strokeDasharray="3,4"/>
          <text x={W-PR+3} y={y+4} fill={col} fontSize="9" fontFamily="monospace">{p}%</text>
        </g>;
      })}

      {/* X axis years */}
      {xLabels.map(({yr,x}) => (
        <text key={yr} x={x} y={H-8} textAnchor="middle" fill="#8FA3BC" fontSize="10">{yr}</text>
      ))}

      {/* Current price marker */}
      {pts.length > 0 && (() => {
        const last = pts[pts.length-1];
        const y = yS(last.close);
        if (y < PT || y > H-PB) return null;
        return <circle cx={xS(pts.length-1)} cy={y} r="3" fill={color} />;
      })()}

      {/* Hover tooltip */}
      {tip && (() => {
        const tx = Math.min(tip.x + 8, W - 108);
        const ty = Math.max(PT, Math.min(tip.y - 34, H-PB-52));
        return <g>
          <line x1={tip.x} x2={tip.x} y1={PT} y2={H-PB} stroke="#BFD0E8" strokeWidth="1" strokeDasharray="3,3"/>
          <circle cx={tip.x} cy={tip.y} r="3.5" fill={color}/>
          <rect x={tx} y={ty} width="104" height={tip.dd!=null?50:34} rx="4" fill="#FFFFFF" stroke="#D1D9E6" strokeWidth="1" filter="drop-shadow(0 1px 3px rgba(0,0,0,0.10))"/>
          <text x={tx+7} y={ty+14} fill="#8FA3BC" fontSize="10" fontFamily="monospace">{tip.date}</text>
          <text x={tx+7} y={ty+28} fill="#1A2640" fontSize="12" fontFamily="monospace" fontWeight="600">
            ${tip.close.toFixed(2)}
          </text>
          {tip.dd != null && (
            <text x={tx+7} y={ty+43} fill={tip.dd >= 0 ? '#16A34A' : '#DC2626'} fontSize="10" fontFamily="monospace">
              {tip.dd.toFixed(2)}% vs ATH
            </text>
          )}
        </g>;
      })()}
    </svg>
  );
}

/* ═══════════════════════════════════════════════════
   DRAWDOWN METER
═══════════════════════════════════════════════════ */
function DrawdownMeter({ dd, peakPrice }) {
  const clampedPct = Math.max(0, Math.min(100, (Math.abs(dd||0) / 30) * 100));
  const col = dd > -10 ? '#16A34A' : dd > -20 ? '#B45309' : '#DC2626';

  return (
    <div className="dd-meter-wrap">
      <div className="dd-top">
        <span className="dd-value" style={{color: col}}>{pct(dd)}</span>
        <span className="dd-ath">ATH <span>{$(peakPrice)}</span></span>
      </div>
      <div className="meter-track">
        <div className="meter-fill" style={{ width: `${clampedPct}%` }}>
          <div className="meter-thumb" style={{ background: col }} />
        </div>
        {DD_LEVELS.map(l => (
          <div key={l.pct} style={{
            position:'absolute', left:`${Math.abs(l.pct)/30*100}%`,
            top:-3, width:1, height:13, background:'rgba(0,0,0,0.12)'
          }}/>
        ))}
      </div>
      <div className="meter-ticks">
        {['0%','-10%','-15%','-20%','-25%','-30%'].map(t => (
          <span key={t} className="meter-tick">{t}</span>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════ */
function App() {
  const [ticker, setTicker]     = useState('SPX');
  const [cash, setCash]         = useState(200000);
  const [cashStr, setCashStr]   = useState('200000');
  const [hist, setHist]         = useState([]);
  const [loading, setLoading]   = useState(false);
  const [errMsg, setErrMsg]     = useState(null);
  const [dataSource, setDataSource] = useState(null);  // 'Stooq' | 'Yahoo Finance'
  const [fetchStatus, setFetchStatus] = useState(null); // 'stooq' | 'yahoo'
  const [action, setAction]     = useState('BUY');
  const [amtStr, setAmtStr]     = useState('');
  const [note, setNote]         = useState('');

  const tc = TICKERS[ticker];

  // Per-ticker transaction persistence
  const [txs, setTxs] = useState(() => {
    try { return JSON.parse(localStorage.getItem(`dca_${ticker}`) || '[]'); } catch { return []; }
  });

  useEffect(() => {
    try { const s = JSON.parse(localStorage.getItem(`dca_${ticker}`) || '[]'); setTxs(s); } catch { setTxs([]); }
  }, [ticker]);

  useEffect(() => {
    try { localStorage.setItem(`dca_${ticker}`, JSON.stringify(txs)); } catch {}
  }, [txs, ticker]);

  // Fetch data — Stooq primary, Yahoo Finance fallback
  const fetchData = useCallback(async () => {
    setLoading(true); setErrMsg(null); setDataSource(null); setFetchStatus(null);
    try {
      const { data, source } = await fetchPriceData(ticker, tc.stooq, setFetchStatus);
      setHist(data);
      setDataSource(source);
    } catch(e) {
      setErrMsg(`Could not load ${ticker} data from Stooq or Yahoo Finance. ${e.message}`);
    } finally { setLoading(false); setFetchStatus(null); }
  }, [ticker, tc.stooq]);

  useEffect(() => { fetchData(); }, [fetchData]);

  // Derived market data
  const currentPrice = hist.length ? hist[hist.length-1].close : null;
  const currentDate  = hist.length ? hist[hist.length-1].date  : null;
  const peakPrice    = hist.length ? Math.max(...hist.map(d=>d.close)) : null;
  const dd           = currentPrice && peakPrice ? (currentPrice - peakPrice) / peakPrice * 100 : null;

  // Allocation guide
  const guide = useMemo(() => {
    if (!peakPrice) return [];
    return DD_LEVELS.map(({pct:p, invest}) => {
      const triggerPrice = peakPrice * (1 + p/100);
      const amount = cash * invest / 100;
      const triggered = dd != null && dd <= p;
      // "active" = we are currently at this particular band
      const nextPct = DD_LEVELS.find(l => l.pct === p + (-5)) ?.pct ?? -35;
      const active = dd != null && dd <= p && dd > nextPct;
      return { pct: p, invest, triggerPrice, amount, triggered, active };
    });
  }, [peakPrice, cash, dd]);

  // Trigger lines for chart
  const triggerLevels = useMemo(() => {
    if (!peakPrice) return [];
    return DD_LEVELS.map(({pct:p}) => ({ pct:p, price: peakPrice*(1+p/100) }));
  }, [peakPrice]);

  // Portfolio math
  const pf = useMemo(() => {
    const buys  = txs.filter(t => t.action==='BUY');
    const sells = txs.filter(t => t.action==='SELL');
    const spent    = buys.reduce((s,t) => s+t.amount, 0);
    const received = sells.reduce((s,t) => s+t.amount, 0);
    const cashBal   = cash - spent + received;
    const unitsHeld = buys.reduce((s,t)=>s+t.units,0) - sells.reduce((s,t)=>s+t.units,0);
    const mktVal    = currentPrice ? unitsHeld * currentPrice : 0;
    const equity    = cashBal + mktVal;
    const pl        = equity - cash;
    const ret       = cash > 0 ? (pl/cash)*100 : 0;
    return { cashBal, unitsHeld, mktVal, equity, pl, ret };
  }, [txs, cash, currentPrice]);

  // Trade preview
  const tradeAmt   = parseFloat(amtStr) || 0;
  const tradeUnits = currentPrice && tradeAmt ? tradeAmt / currentPrice : 0;

  // Execute trade
  const execTrade = () => {
    if (!tradeAmt || !currentPrice) return;
    const newTx = {
      id:     Date.now(),
      date:   currentDate || new Date().toISOString().slice(0,10),
      price:  currentPrice,
      action,
      units:  tradeUnits,
      amount: tradeAmt,
      note:   note.trim(),
    };
    setTxs(prev => [...prev, newTx]);
    setAmtStr(''); setNote('');
  };

  const removeTx = id => setTxs(prev => prev.filter(t => t.id !== id));
  const clearAll = () => { if(confirm(`Clear all ${ticker} transactions?`)) setTxs([]); };

  // Running portfolio state for tx log
  const txWithState = useMemo(() => {
    let runCash  = cash;
    let runUnits = 0;
    return txs.map(tx => {
      if (tx.action === 'BUY')  { runCash -= tx.amount; runUnits += tx.units; }
      else                      { runCash += tx.amount; runUnits -= tx.units; }
      const equity = runCash + runUnits * tx.price;
      return { ...tx, cashAfter: runCash, unitsAfter: runUnits, equityAfter: equity };
    });
  }, [txs, cash]);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh' }}>

      {/* ── HEADER ──────────────────────────────── */}
      <div className="header">
        <span className="logo">⚡ Crash-Buying DCA · LCC Method 1</span>

        <div className="ticker-tabs">
          {Object.values(TICKERS).map(t => (
            <button key={t.label} className="ticker-tab"
              style={ticker===t.label ? {background:t.bg, borderColor:t.color, color:t.color} : {}}
              onClick={() => setTicker(t.label)}>
              {t.label}
            </button>
          ))}
        </div>

        <div className="header-price">
          {currentPrice ? <>
            <span className="current-price" style={{color:tc.color}}>{$(currentPrice)}</span>
            {dd != null && (
              <span className="drawdown-pill"
                style={{ background: dd > -10 ? 'rgba(22,163,74,0.12)' : dd > -20 ? 'rgba(180,83,9,0.10)' : 'rgba(220,38,38,0.10)',
                         color: dd > -10 ? '#16A34A' : dd > -20 ? '#B45309' : '#DC2626' }}>
                {pct(dd)} from ATH
              </span>
            )}
          </> : loading ? <span style={{color:'var(--muted)',fontSize:12}}>Loading…</span> : null}
          <button className="refresh-btn" onClick={fetchData}>↻ Refresh</button>
        </div>
      </div>

      {/* ── BODY ────────────────────────────────── */}
      <div className="app-body">

        {/* ── LEFT PANEL ─────────────────────── */}
        <div className="left-panel">
          <div className="left-scroll">

            {/* Drawdown Meter */}
            <div className="sec-hdr">
              <span>Drawdown Status</span>
              <span style={{color:tc.color, fontSize:9}}>{tc.name}</span>
            </div>
            {dd != null
              ? <DrawdownMeter dd={dd} peakPrice={peakPrice}/>
              : <div style={{padding:'12px 14px',color:'var(--muted)',fontSize:12}}>
                  {loading ? 'Fetching price data…' : errMsg ? 'Price unavailable' : '—'}
                </div>
            }

            {/* Index reference banner — shown only when SPX is selected */}
            {tc.isIndex && (
              <div className="index-banner">
                <strong>S&amp;P 500 Index · Reference Only</strong><br/>
                This is the raw index used by Loo Cheng Chuan's crash-buying simulator (~$5,500 level).
                It is <em>not directly purchasable</em>. To act on drawdown signals, buy one of these ETFs instead:
                <div className="etf-chips">
                  {['SPY','VOO'].map(t => (
                    <button key={t} className="index-chip"
                      style={{background: TICKERS[t].bg, borderColor: TICKERS[t].color, color: TICKERS[t].color}}
                      onClick={() => setTicker(t)}>
                      {t} · {t==='SPY'?'≈ SPX ÷ 10':'≈ SPX ÷ 10'}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Starting Cash */}
            <div className="cash-row">
              <span className="cash-label">Starting Cash</span>
              <input className="cash-input" type="number" value={cashStr}
                onChange={e => {
                  setCashStr(e.target.value);
                  const n = parseFloat(e.target.value);
                  if (!isNaN(n) && n > 0) setCash(n);
                }} />
            </div>

            {/* Portfolio */}
            <div className="sec-hdr"><span>Portfolio</span></div>
            {[
              { label:'Cash Balance',  val: $(pf.cashBal)  },
              { label:'Units Held',    val: u4(pf.unitsHeld) },
              { label:'Market Value',  val: $(pf.mktVal)   },
              { label:'Total Equity',  val: $(pf.equity), bold:true },
              { label:'P&L',           val: $(pf.pl), cls: pf.pl>=0?'pos':'neg' },
              { label:'Return',        val: pct(pf.ret), cls: pf.ret>=0?'pos':'neg' },
            ].map(({label,val,bold,cls}) => (
              <div key={label} className="pf-row">
                <span className="pf-label">{label}</span>
                <span className={`pf-val mono ${bold?'bold':''} ${cls||''}`}>{val}</span>
              </div>
            ))}

            {/* Allocation Guide */}
            <div className="sec-hdr">
              <span>Allocation Guide</span>
              <span className="sec-badge">Method 1 · Crash-Buying</span>
            </div>
            <table className="alloc-table">
              <thead>
                <tr>
                  <th>Drawdown</th>
                  <th>Trigger $</th>
                  <th>%</th>
                  <th>Amount</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {guide.map(({pct:p, invest, triggerPrice, amount, triggered, active}) => (
                  <tr key={p}
                    className={active ? 'alloc-row-active' : triggered && !active ? 'alloc-row-used' : ''}>
                    <td className="dd-cell" style={{color: triggered ? '#DC2626' : 'var(--muted)'}}>
                      {p}%
                      {active && <span style={{marginLeft:5,color:tc.color,fontSize:9}}>◀</span>}
                    </td>
                    <td className="trigger-cell">{$(triggerPrice)}</td>
                    <td className="pct-cell">{invest}%</td>
                    <td className="amt-cell">${(amount/1000).toFixed(0)}K</td>
                    <td>
                      <button className="use-btn"
                        style={{
                          background: active ? tc.color : triggered ? 'var(--border2)' : 'var(--border)',
                          color:      active ? 'white'  : triggered ? 'var(--muted)' : 'var(--muted2)',
                        }}
                        onClick={() => { setAmtStr(amount.toFixed(0)); setAction('BUY'); }}>
                        Use
                      </button>
                    </td>
                  </tr>
                ))}
                <tr className="alloc-total-row">
                  <td colSpan={2} style={{color:'var(--muted)'}}>Total invested</td>
                  <td style={{fontFamily:'monospace'}}>100%</td>
                  <td style={{fontFamily:'monospace'}}>${(cash/1000).toFixed(0)}K</td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        {/* ── RIGHT PANEL ────────────────────── */}
        <div className="right-panel">

          {/* Chart */}
          <div className="chart-wrap">
            <div className="chart-meta">
              <span className="chart-meta-label">
                {tc.name} · as of {currentDate || '—'}
                {dataSource && <span style={{marginLeft:8,color:'var(--muted2)',fontSize:10}}>via {dataSource}</span>}
              </span>
              <div className="chart-legend">
                <span><span className="legend-dot" style={{background:'#B45309',borderTop:'1px dashed #B45309'}}></span> ATH</span>
                <span><span className="legend-dot" style={{borderTop:'1px dashed rgba(239,68,68,0.7)'}}></span> Trigger levels</span>
              </div>
            </div>
            {loading
              ? <div className="loading-box">
                  {fetchStatus === 'yahoo'
                    ? `Stooq unavailable — trying Yahoo Finance for ${ticker}…`
                    : `Fetching ${ticker} price history from Stooq…`}
                </div>
              : errMsg
              ? <div className="err-box">{errMsg}<br/><button onClick={fetchData} style={{marginTop:10,padding:'4px 12px',background:'var(--border2)',border:'none',color:'var(--text)',borderRadius:4,cursor:'pointer'}}>↻ Retry</button></div>
              : <PriceChart data={hist} peakPrice={peakPrice} triggerLevels={triggerLevels} color={tc.color} ticker={ticker}/>
            }
          </div>

          {/* Trade Input */}
          <div className="trade-section">
            <div className="sec-hdr" style={{margin:'0 -16px 8px',padding:'5px 16px'}}>
              <span>Trade Input</span>
              {currentPrice && <span style={{color:'var(--muted)',fontSize:10,fontFamily:'monospace'}}>{tc.label} @ {$(currentPrice)}</span>}
            </div>
            <div className="trade-row">
              <div className="action-group">
                {['BUY','SELL'].map(a => (
                  <button key={a} className="action-btn"
                    onClick={() => setAction(a)}
                    style={{
                      background: action===a ? (a==='BUY'?'#16A34A':'#DC2626') : 'var(--surface2)',
                      color:      action===a ? 'white' : 'var(--muted)',
                    }}>
                    {a}
                  </button>
                ))}
              </div>

              <input className="trade-input" type="number" placeholder="Amount ($)"
                value={amtStr} onChange={e => setAmtStr(e.target.value)}/>

              <span className="trade-units-hint">
                {tradeUnits > 0 ? `= ${u4(tradeUnits)} units` : '— units'}
              </span>

              <input className="trade-note" type="text" placeholder="Note (optional)"
                value={note} onChange={e => setNote(e.target.value)}/>

              <button className="exec-btn"
                disabled={!tradeAmt || !currentPrice}
                onClick={execTrade}
                style={{
                  background: tradeAmt && currentPrice ? tc.color : 'var(--border2)',
                  color:      tradeAmt && currentPrice ? 'white'  : 'var(--muted2)',
                }}>
                Execute Trade
              </button>
            </div>
            {tradeAmt > 0 && currentPrice && (
              <div className="trade-preview">
                Preview: {action} {u4(tradeUnits)} units at {$(currentPrice)} = {$(tradeAmt)} ·
                Cash after: {$(pf.cashBal + (action==='SELL'?tradeAmt:-tradeAmt))}
              </div>
            )}
          </div>

          {/* Transaction Log */}
          <div className="tx-log">
            <div className="sec-hdr">
              <span>Transaction Log</span>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{color:'var(--muted)',fontSize:10}}>{txs.length} trade{txs.length!==1?'s':''}</span>
                {txs.length > 0 && (
                  <button onClick={clearAll} style={{background:'none',border:'none',color:'var(--muted2)',cursor:'pointer',fontSize:10}}>
                    Clear all
                  </button>
                )}
              </div>
            </div>

            {txs.length === 0
              ? <div className="tx-empty">No trades yet. Use the Allocation Guide to place your first trade.</div>
              : (
                <table className="tx-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Date</th>
                      <th>Price</th>
                      <th>Action</th>
                      <th>Units</th>
                      <th>Amount</th>
                      <th>Cash After</th>
                      <th>Units After</th>
                      <th>Equity After</th>
                      <th>Note</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {txWithState.map((tx,i) => (
                      <tr key={tx.id}>
                        <td style={{color:'var(--muted)'}}>{i+1}</td>
                        <td>{tx.date}</td>
                        <td>{$(tx.price)}</td>
                        <td><span className={`badge badge-${tx.action.toLowerCase()}`}>{tx.action}</span></td>
                        <td>{u4(tx.units)}</td>
                        <td>{$(tx.amount)}</td>
                        <td>{$(tx.cashAfter)}</td>
                        <td>{u4(tx.unitsAfter)}</td>
                        <td style={{color: tx.equityAfter >= cash ? '#16A34A' : '#DC2626'}}>{$(tx.equityAfter)}</td>
                        <td style={{color:'var(--muted)',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {tx.note || <span style={{color:'var(--muted2)'}}>—</span>}
                        </td>
                        <td><button className="tx-del" onClick={() => removeTx(tx.id)}>✕</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )
            }
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
