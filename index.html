<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crash Buying Simulator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D1117; }
    @keyframes pulse  { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:#161B22; }
    ::-webkit-scrollbar-thumb { background:#30363D; border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:#484F58; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── Config ─────────────────────────────────────────────────────────────────
const INDICES = {
  QQQ:  { ticker:"qqq.us",  fullName:"Invesco QQQ",            subName:"Nasdaq-100 Technology ETF",                  color:"#22D3EE", dim:"rgba(34,211,238,0.10)"   },
  SPY:  { ticker:"spy.us",  fullName:"SPDR S&P 500 ETF",       subName:"S&P 500 · State Street · ER 0.0945%",        color:"#4ADE80", dim:"rgba(74,222,128,0.10)"   },
  VOO:  { ticker:"voo.us",  fullName:"Vanguard S&P 500 ETF",   subName:"S&P 500 · Vanguard · ER 0.03% (lower cost)", color:"#A78BFA", dim:"rgba(167,139,250,0.10)"  },
  URTH: { ticker:"urth.us", fullName:"iShares MSCI World ETF", subName:"Developed-market global equities",            color:"#FB923C", dim:"rgba(251,146,60,0.10)"   },
};

const CRASH_EVENTS = [
  { label:"2018 Trade War",       date:"2018-12-24" },
  { label:"2020 Covid",           date:"2020-03-23" },
  { label:"2022 Inflation",       date:"2022-10-13" },
  { label:"2025 Liberation Day",  date:"2025-04-08" },
];

const TIERS = [
  { drawdown:-10, invest:10 },
  { drawdown:-15, invest:15 },
  { drawdown:-20, invest:20 },
  { drawdown:-25, invest:25 },
  { drawdown:-30, invest:30 },
];

const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

const STORAGE_KEY = "crash-sim-v4";

// ─── Utilities ───────────────────────────────────────────────────────────────
const fmt    = (n, dec=2) => (n==null||isNaN(n)) ? "—" : n.toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec});
const fmtUSD = n => (n==null||isNaN(n)) ? "—" : (n<0?"-$":"$")+fmt(Math.abs(n));
const fmtPct = n => (n==null||isNaN(n)) ? "—" : (n>=0?"+":"")+fmt(n)+"%";
const shortDate = d => !d ? "—" : new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});

function parseCSV(csv) {
  return csv.trim().split("\n").slice(1)
    .map(l => { const c=l.split(","); const date=c[0]?.trim(); const price=parseFloat(c[4]); return (date&&!isNaN(price)&&price>0)?{date,price}:null; })
    .filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));
}

async function stooqFetch(ticker) {
  const url = `https://stooq.com/q/d/l/?s=${ticker}&i=d`;
  for (const proxy of PROXIES) {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 10000);
      const res = await fetch(proxy(url), { signal:ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) continue;
      const text = await res.text();
      if (!text||text.length<200||text.toLowerCase().includes("no data")) continue;
      const rows = parseCSV(text);
      if (rows.length>50) return rows;
    } catch { continue; }
  }
  return null;
}

// ─── localStorage ─────────────────────────────────────────────────────────────
function readSaved()    { try { const s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):null; } catch { return null; } }
function writeState(d)  { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); } catch {} }

// ─── ChartSVG (top-level so React never remounts it on parent re-render) ──────
function ChartSVG({ data, myTrades, peakPrice, color, crashJump }) {
  const filtered = useMemo(()=>data.filter(d=>d.date>="2016-01-01"),[data]);
  if (!filtered.length) return null;

  const W=760,H=190,PL=52,PR=16,PT=16,PB=36;
  const cw=W-PL-PR, ch=H-PT-PB;
  const prices = filtered.map(d=>d.price);
  const minP   = Math.min(...prices)*0.94;
  const maxP   = Math.max(...prices)*1.03;
  const t0 = new Date(filtered[0].date).getTime();
  const t1 = new Date(filtered[filtered.length-1].date).getTime();
  const span = t1-t0||1;
  const xOf = d => PL+((new Date(d).getTime()-t0)/span)*cw;
  const yOf = p => PT+ch-((p-minP)/(maxP-minP))*ch;
  const pathD = filtered.map((d,i)=>`${i===0?"M":"L"}${xOf(d.date).toFixed(1)},${yOf(d.price).toFixed(1)}`).join(" ");

  const last = filtered[filtered.length-1];
  const peak = filtered.reduce((a,b)=>b.price>a.price?b:a, filtered[0]);
  const pkX=xOf(peak.date), pkY=yOf(peak.price);
  const lX=xOf(last.date),  lY=yOf(last.price);

  const years=[]; for(let y=2017;y<=2026;y++){ const ds=`${y}-01-01`; if(ds>=filtered[0].date&&ds<=last.date) years.push(y); }
  const yTicks=[0,0.25,0.5,0.75,1].map(r=>({ y:PT+ch*r, label:(()=>{ const p=maxP-(maxP-minP)*r; return p>=1000?`${(p/1000).toFixed(1)}k`:p.toFixed(0); })() }));
  const crashes=CRASH_EVENTS.filter(e=>e.date>=filtered[0].date&&e.date<=last.date).map(e=>({...e,x:xOf(e.date)}));
  const dd = peakPrice>0 ? (last.price-peakPrice)/peakPrice*100 : 0;
  const gid = `ag${color.replace(/[^a-z0-9]/gi,"")}`;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",overflow:"visible"}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.22"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
        <linearGradient id="ddGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor="#F87171" stopOpacity="0.13"/>
          <stop offset="100%" stopColor="#F87171" stopOpacity="0"/>
        </linearGradient>
      </defs>

      {yTicks.map(({y,label})=>(
        <g key={label}>
          <line x1={PL} y1={y} x2={PL+cw} y2={y} stroke="#ffffff08" strokeWidth="1"/>
          <text x={PL-6} y={y+4} fontSize="9" fill="#555" textAnchor="end">{label}</text>
        </g>
      ))}
      {years.map(yr=>(
        <text key={yr} x={xOf(`${yr}-01-01`)} y={H-6} fontSize="9" fill="#555" textAnchor="middle">{yr}</text>
      ))}
      {crashes.map(e=>(
        <line key={e.label} x1={e.x} y1={PT} x2={e.x} y2={PT+ch}
          stroke={crashJump===e.date?"#FB923C":"#FB923C70"}
          strokeWidth={crashJump===e.date?2:1}
          strokeDasharray={crashJump===e.date?"0":"3,3"}/>
      ))}
      {dd<-5 && <path d={`M${pkX},${pkY} L${lX},${lY} L${lX},${PT+ch} L${pkX},${PT+ch}Z`} fill="url(#ddGrad)"/>}
      <path d={`${pathD} L${PL+cw},${PT+ch} L${PL},${PT+ch}Z`} fill={`url(#${gid})`}/>
      <path d={pathD} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
      {myTrades.map(t=>{
        if (!t.date||t.date<filtered[0].date) return null;
        const tx=xOf(t.date), ty=yOf(t.price);
        return <polygon key={t.id} points={`${tx},${ty-7} ${tx-5},${ty+3} ${tx+5},${ty+3}`} fill={t.action==="BUY"?"#4ADE80":"#F87171"} stroke="#0D1117" strokeWidth="1"/>;
      })}
      <circle cx={pkX} cy={pkY} r="3.5" fill="#FCD34D" stroke="#0D1117" strokeWidth="1.5"/>
      <circle cx={lX}  cy={lY}  r="4"   fill={color}   stroke="#0D1117" strokeWidth="1.5"/>
    </svg>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [idx,      setIdx]    = useState("QQQ");
  const [priceData, setPD]    = useState({QQQ:null,SPY:null,VOO:null,URTH:null});
  const [fetchStat, setFS]    = useState({QQQ:"idle",SPY:"idle",VOO:"idle",URTH:"idle"});
  const [fetchErr,  setFE]    = useState({QQQ:null,SPY:null,VOO:null,URTH:null});
  const [startingCash, setSC] = useState(200000);
  const [cashInput, setCI]    = useState("200000");
  const [trades, setTrades]   = useState({QQQ:[],SPY:[],VOO:[],URTH:[]});
  const [tradeAction, setTA]  = useState("BUY");
  const [amount, setAmt]      = useState("");
  const [crashJump, setCJ]    = useState(null);
  const statRef = useRef({QQQ:"idle",SPY:"idle",VOO:"idle",URTH:"idle"});

  // ── Load from localStorage ───────────────────────────────────────────────
  useEffect(()=>{
    const saved = readSaved();
    if (saved) {
      if (saved.idx)    setIdx(saved.idx);
      if (saved.cash)   { setSC(saved.cash); setCI(String(saved.cash)); }
      if (saved.trades) setTrades(cur=>({...cur,...saved.trades}));
    }
  },[]);

  // ── Fetch data ───────────────────────────────────────────────────────────
  const fetchIndex = useCallback(async (sym)=>{
    if (statRef.current[sym]==="loading"||statRef.current[sym]==="done") return;
    statRef.current={...statRef.current,[sym]:"loading"};
    setFS(s=>({...s,[sym]:"loading"}));
    const rows = await stooqFetch(INDICES[sym].ticker);
    if (rows&&rows.length>50) {
      setPD(p=>({...p,[sym]:rows}));
      statRef.current={...statRef.current,[sym]:"done"};
      setFS(s=>({...s,[sym]:"done"}));
    } else {
      setFE(e=>({...e,[sym]:"Could not load price data. Check internet or CORS proxy access."}));
      statRef.current={...statRef.current,[sym]:"error"};
      setFS(s=>({...s,[sym]:"error"}));
    }
  },[]);

  useEffect(()=>{ fetchIndex("QQQ"); },[]);
  useEffect(()=>{ fetchIndex(idx);   },[idx]);

  // ── Persist to localStorage ──────────────────────────────────────────────
  const persist = useCallback((newTrades,newCash,newIdx)=>{
    writeState({idx:newIdx??idx, cash:newCash??startingCash, trades:newTrades??trades});
  },[idx,startingCash,trades]);

  // ── Derived values ───────────────────────────────────────────────────────
  const data      = priceData[idx]??[];
  const lastEntry = data[data.length-1];
  const curPrice  = lastEntry?.price??0;
  const curDate   = lastEntry?.date??"";

  const peakEntry   = useMemo(()=>data.reduce((a,b)=>b.price>a.price?b:a,{price:0,date:""}), [data]);
  const peakPrice   = peakEntry.price;
  const drawdownPct = peakPrice>0 ? (curPrice-peakPrice)/peakPrice*100 : 0;

  const myTrades    = trades[idx]??[];
  const cashSpent   = myTrades.reduce((s,t)=>s+(t.action==="BUY"?t.amount:-t.amount),0);
  const totalUnits  = myTrades.reduce((s,t)=>s+(t.action==="BUY"?t.units:-t.units),0);
  const cashBalance = startingCash-cashSpent;
  const marketValue = totalUnits*curPrice;
  const totalEquity = cashBalance+marketValue;
  const pnl         = totalEquity-startingCash;
  const returnPct   = startingCash>0 ? pnl/startingCash*100 : 0;

  const allocationGuide = useMemo(()=>TIERS.map(t=>({
    ...t,
    triggerPrice: peakPrice*(1+t.drawdown/100),
    investAmount: startingCash*(t.invest/100),
    triggered:    drawdownPct<=t.drawdown,
  })),[peakPrice,startingCash,drawdownPct]);

  const suggestedTier = [...allocationGuide].reverse().find(t=>t.triggered);
  const amtNum     = parseFloat(amount)||0;
  const tradeUnits = curPrice>0&&amtNum>0 ? amtNum/curPrice : 0;
  const pvwCash    = cashBalance-(tradeAction==="BUY"?amtNum:-amtNum);
  const pvwUnits   = totalUnits+(tradeAction==="BUY"?tradeUnits:-tradeUnits);
  const pvwEquity  = pvwCash+pvwUnits*curPrice;

  const cfg      = INDICES[idx];
  const barFill  = Math.min(Math.abs(Math.max(-30,Math.min(0,drawdownPct)))/30*100,100);
  const barColor = drawdownPct<-20?"#F87171":drawdownPct<-10?"#FBBF24":cfg.color;

  // ── Handlers ─────────────────────────────────────────────────────────────
  const executeTrade = ()=>{
    if (!tradeUnits||!curPrice||!curDate) return;
    const sign=tradeAction==="BUY"?1:-1;
    const nca=cashBalance-sign*amtNum, nua=totalUnits+sign*tradeUnits;
    const t={id:Date.now(),date:curDate,price:curPrice,action:tradeAction,units:tradeUnits,amount:amtNum,cashAfter:nca,unitsAfter:nua,equityAfter:nca+nua*curPrice};
    const nt={...trades,[idx]:[...(trades[idx]??[]),t]};
    setTrades(nt); setAmt(""); persist(nt,null,null);
  };
  const deleteTrade = id=>{ const nt={...trades,[idx]:(trades[idx]??[]).filter(t=>t.id!==id)}; setTrades(nt); persist(nt,null,null); };
  const clearAll    = ()=>{ const nt={...trades,[idx]:[]}; setTrades(nt); persist(nt,null,null); };
  const suggest     = ()=>{ if(suggestedTier){setAmt(String(suggestedTier.investAmount));setTA("BUY");} };
  const switchIdx   = sym=>{ setIdx(sym); setAmt(""); persist(null,null,sym); };
  const handleCash  = val=>{ setCI(val); const n=parseFloat(val.replace(/,/g,"")); if(!isNaN(n)&&n>0){setSC(n);persist(null,n,null);} };
  const retryFetch  = sym=>{ statRef.current={...statRef.current,[sym]:"idle"}; setPD(p=>({...p,[sym]:null})); setFS(s=>({...s,[sym]:"idle"})); setFE(e=>({...e,[sym]:null})); setTimeout(()=>fetchIndex(sym),50); };

  // ── Styles ────────────────────────────────────────────────────────────────
  const CARD = {background:"#161B22",borderRadius:12,padding:"14px 16px",border:"1px solid #21262D"};
  const SH   = {fontSize:10,fontWeight:700,letterSpacing:"0.1em",color:"#555",textTransform:"uppercase",marginBottom:12};
  const INP  = {width:"100%",background:"#21262D",border:"1px solid #30363D",borderRadius:6,padding:"7px 10px",color:"#E6EDF3",fontSize:13,fontWeight:600,textAlign:"right",outline:"none"};

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <div style={{background:"#0D1117",color:"#E6EDF3",minHeight:"100vh",fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,sans-serif",padding:16,fontSize:13}}>

      {/* ── Header ──────────────────────────────────────────────────── */}
      <div style={{display:"flex",alignItems:"flex-start",marginBottom:14,gap:12,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:220}}>
          <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>Crash Buying Simulator</div>
          <div style={{fontSize:20,fontWeight:800,letterSpacing:"-0.03em"}}>Drawdown-Triggered DCA</div>
          <div style={{fontSize:11,color:"#555",marginTop:3}}>{cfg.fullName} · <span style={{color:cfg.color}}>{cfg.subName}</span></div>
        </div>
        {/* Index tabs */}
        <div style={{display:"flex",gap:4,background:"#161B22",borderRadius:10,padding:4,border:"1px solid #21262D"}}>
          {Object.entries(INDICES).map(([sym,c])=>(
            <button key={sym} onClick={()=>switchIdx(sym)} style={{
              padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",
              fontSize:13,fontWeight:700,transition:"all 0.18s",
              background:idx===sym?c.color:"transparent",
              color:idx===sym?"#0D1117":"#555",
              boxShadow:idx===sym?`0 0 14px ${c.color}44`:"none",
            }}>{sym}</button>
          ))}
        </div>
      </div>

      {/* ── Chart Card ──────────────────────────────────────────────── */}
      <div style={{...CARD,marginBottom:12,border:`1px solid ${cfg.color}22`}}>
        {/* Drawdown bar */}
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:5}}>
            <span style={{color:"#555"}}>Peak to Date</span>
            <span style={{color:drawdownPct<-10?"#F87171":"#888",fontWeight:600}}>
              {curPrice>0 ? `${fmtPct(drawdownPct)} from $${fmt(peakPrice)} peak` : "Loading…"}
            </span>
          </div>
          <div style={{position:"relative",height:6,background:"#21262D",borderRadius:3,overflow:"hidden"}}>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${barFill}%`,background:barColor,borderRadius:3,transition:"width 0.5s ease"}}/>
            {[-10,-15,-20,-25,-30].map(p=>(
              <div key={p} style={{position:"absolute",left:`${Math.abs(p)/30*100}%`,top:0,bottom:0,width:1,background:"#0D1117"}}/>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:2,fontSize:9,color:"#444"}}>
            {[-10,-15,-20,-25,-30].map(p=><span key={p}>{p}%</span>)}
          </div>
        </div>

        {/* Crash event buttons */}
        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
          {CRASH_EVENTS.map(e=>(
            <button key={e.label} onClick={()=>{setCJ(e.date);setTimeout(()=>setCJ(null),2500);}} style={{
              padding:"3px 10px",borderRadius:5,border:"1px solid #FB923C60",
              background:crashJump===e.date?"#FB923C":"transparent",
              color:crashJump===e.date?"#0D1117":"#FB923C",
              fontSize:10,fontWeight:600,cursor:"pointer",transition:"all 0.15s",
            }}>{e.label}</button>
          ))}
        </div>

        {/* Chart */}
        {fetchStat[idx]==="loading" && (
          <div style={{height:190,display:"flex",alignItems:"center",justifyContent:"center",color:"#555",fontSize:12}}>
            <span style={{animation:"pulse 1.4s ease-in-out infinite"}}>Loading {idx} data via Stooq…</span>
          </div>
        )}
        {fetchStat[idx]==="error" && (
          <div style={{height:190,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}>
            <div style={{color:"#F87171",fontSize:12,textAlign:"center",maxWidth:380}}>{fetchErr[idx]}</div>
            <button onClick={()=>retryFetch(idx)} style={{padding:"7px 20px",borderRadius:7,border:"none",background:cfg.color,color:"#0D1117",cursor:"pointer",fontSize:12,fontWeight:700}}>Retry</button>
          </div>
        )}
        {fetchStat[idx]==="done"&&data.length>0 && (
          <ChartSVG data={data} myTrades={myTrades} peakPrice={peakPrice} color={cfg.color} crashJump={crashJump}/>
        )}

        {/* Chart footer */}
        {curPrice>0 && (
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:11,flexWrap:"wrap",gap:4}}>
            <span style={{color:"#555"}}>Current: <strong style={{color:cfg.color}}>${fmt(curPrice)}</strong></span>
            <span style={{color:"#555"}}>As of: <strong style={{color:"#888"}}>{shortDate(curDate)}</strong></span>
            <span style={{color:"#555"}}>ATH: <strong style={{color:"#FCD34D"}}>${fmt(peakPrice)}</strong> <span style={{color:"#444"}}>({shortDate(peakEntry.date)})</span></span>
          </div>
        )}
      </div>

      {/* ── Main grid ─────────────────────────────────────────────────── */}
      <div style={{display:"grid",gridTemplateColumns:"220px 1fr",gap:12}}>

        {/* ── Left column ─────────────────────────────────────────── */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>

          {/* Portfolio */}
          <div style={CARD}>
            <div style={SH}>Portfolio · {idx}</div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:"#555",marginBottom:4}}>Starting Cash</div>
              <input value={cashInput} onChange={e=>handleCash(e.target.value)} style={INP}/>
            </div>
            {[
              ["Cash Balance", fmtUSD(cashBalance), cashBalance<0?"#F87171":"#E6EDF3"],
              ["Units Held",   fmt(totalUnits,4),   "#E6EDF3"],
              ["Market Value", fmtUSD(marketValue),  "#E6EDF3"],
              ["Total Equity", fmtUSD(totalEquity),  "#E6EDF3"],
              ["P&L",          fmtUSD(pnl),          pnl>=0?"#4ADE80":"#F87171"],
              ["Return %",     fmtPct(returnPct),    returnPct>=0?"#4ADE80":"#F87171"],
            ].map(([label,value,color])=>(
              <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #21262D"}}>
                <span style={{fontSize:12,color:"#666"}}>{label}</span>
                <span style={{fontSize:13,fontWeight:600,color}}>{value}</span>
              </div>
            ))}
          </div>

          {/* Allocation Guide */}
          <div style={CARD}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={SH}>Allocation Guide</div>
              <div style={{fontSize:9,color:cfg.color,fontWeight:700}}>Crash-Buy Rule</div>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr>
                  {["Draw","Trigger","Invest","Amt"].map(h=>(
                    <th key={h} style={{fontSize:9,color:"#444",fontWeight:500,paddingBottom:5,textAlign:(h==="Draw"||h==="Invest")?"center":"right"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {allocationGuide.map(t=>(
                  <tr key={t.drawdown} style={{background:t.triggered?cfg.dim:"transparent"}}>
                    <td style={{textAlign:"center",padding:"4px 2px",color:t.triggered?cfg.color:"#555",fontWeight:t.triggered?700:400}}>{t.drawdown}%</td>
                    <td style={{textAlign:"right",padding:"4px 3px",color:"#E6EDF3"}}>${fmt(t.triggerPrice,0)}</td>
                    <td style={{textAlign:"center",padding:"4px 2px",color:"#555"}}>{t.invest}%</td>
                    <td style={{textAlign:"right",padding:"4px 0 4px 3px",color:"#888"}}>${(t.investAmount/1000).toFixed(0)}k</td>
                  </tr>
                ))}
                <tr style={{borderTop:"1px solid #21262D"}}>
                  <td colSpan={2} style={{color:"#444",fontSize:9,paddingTop:5}}>Total</td>
                  <td style={{textAlign:"center",color:"#666",fontWeight:700,paddingTop:5}}>100%</td>
                  <td style={{textAlign:"right",color:"#666",fontWeight:700,paddingTop:5}}>${(startingCash/1000).toFixed(0)}k</td>
                </tr>
              </tbody>
            </table>
            {suggestedTier && (
              <div style={{marginTop:10,padding:"6px 10px",borderRadius:6,background:cfg.dim,border:`1px solid ${cfg.color}40`,fontSize:10,color:cfg.color}}>
                ⚡ {fmt(drawdownPct,1)}% drawdown — {suggestedTier.drawdown}% tier triggered. Suggested: ${fmt(suggestedTier.investAmount,0)}
              </div>
            )}
          </div>

          {/* Note for SPY/VOO */}
          {(idx==="SPY"||idx==="VOO") && (
            <div style={{...CARD,fontSize:10,color:"#555",lineHeight:1.5,border:"1px solid #21262D"}}>
              <div style={{color:cfg.color,fontWeight:700,marginBottom:4}}>SPY vs VOO</div>
              Both track the S&P 500. SPY trades at ~1/10th of the SPX index level (e.g. SPY $530 ≈ SPX 5,300). Vanguard VOO has a lower expense ratio (0.03% vs 0.0945%) but slightly lower liquidity. Results should be near-identical.
            </div>
          )}
          {idx==="URTH" && (
            <div style={{...CARD,fontSize:10,color:"#555",lineHeight:1.5,border:"1px solid #21262D"}}>
              <div style={{color:cfg.color,fontWeight:700,marginBottom:4}}>URTH · MSCI World</div>
              Covers ~1,500 large/mid-cap stocks across 23 developed markets. US weight ~70%, followed by Japan, UK, France, Canada. More diversified than pure US ETFs but historically lower returns.
            </div>
          )}
        </div>

        {/* ── Right column ────────────────────────────────────────── */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>

          {/* Trade Input */}
          <div style={CARD}>
            <div style={SH}>Trade Input</div>
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr",gap:12,alignItems:"end",marginBottom:12}}>
              <div>
                <div style={{fontSize:10,color:"#555",marginBottom:5}}>Action</div>
                <div style={{display:"flex",gap:4}}>
                  {["BUY","SELL"].map(a=>(
                    <button key={a} onClick={()=>setTA(a)} style={{
                      padding:"7px 14px",borderRadius:6,border:"none",cursor:"pointer",
                      fontSize:12,fontWeight:700,transition:"all 0.15s",
                      background:tradeAction===a?(a==="BUY"?cfg.color:"#F87171"):"#21262D",
                      color:tradeAction===a?"#0D1117":"#555",
                    }}>{a}</button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:10,color:"#555",marginBottom:5}}>Amount ($)</div>
                <input value={amount} onChange={e=>setAmt(e.target.value)} placeholder="0" style={INP}/>
              </div>
              <div>
                <div style={{fontSize:10,color:"#555",marginBottom:5}}>Units (auto)</div>
                <div style={{background:"#21262D",borderRadius:6,padding:"7px 10px",color:"#555",fontSize:13,fontWeight:600,textAlign:"right"}}>
                  {tradeUnits>0?fmt(tradeUnits,4):"0.0000"}
                </div>
              </div>
            </div>

            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <button onClick={suggest} disabled={!suggestedTier||curPrice<=0} style={{
                flex:1,padding:"10px 0",borderRadius:8,border:`1px solid ${cfg.color}60`,
                background:"transparent",color:cfg.color,
                cursor:(suggestedTier&&curPrice>0)?"pointer":"not-allowed",
                fontSize:12,fontWeight:700,opacity:(suggestedTier&&curPrice>0)?1:0.3,transition:"all 0.15s",
              }}>Suggest</button>
              <button onClick={executeTrade} disabled={!tradeUnits||curPrice<=0} style={{
                flex:2.5,padding:"10px 0",borderRadius:8,border:"none",
                background:(tradeUnits>0&&curPrice>0)?cfg.color:"#21262D",
                color:(tradeUnits>0&&curPrice>0)?"#0D1117":"#444",
                cursor:(tradeUnits>0&&curPrice>0)?"pointer":"not-allowed",
                fontSize:13,fontWeight:800,transition:"all 0.15s",
                boxShadow:(tradeUnits>0&&curPrice>0)?`0 0 16px ${cfg.color}44`:"none",
              }}>Execute Trade</button>
            </div>

            {/* Preview */}
            {tradeUnits>0&&curPrice>0 && (
              <div style={{background:"#0D1117",borderRadius:8,padding:"10px 12px",border:"1px solid #21262D",animation:"fadeIn 0.2s ease"}}>
                <div style={{color:"#444",fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Trade Preview</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8}}>
                  {[["Date",shortDate(curDate)],["Price",`$${fmt(curPrice)}`],["Action",tradeAction],["Units",fmt(tradeUnits,4)],["Cash After",fmtUSD(pvwCash)],["Equity After",fmtUSD(pvwEquity)]].map(([label,value])=>(
                    <div key={label}>
                      <div style={{color:"#444",fontSize:9,marginBottom:2}}>{label}</div>
                      <div style={{color:"#E6EDF3",fontWeight:600,fontSize:11}}>{value}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Transaction Log */}
          <div style={{...CARD,flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={SH}>Transaction Log · {idx}</div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:10,color:"#555"}}>{myTrades.length} trade{myTrades.length!==1?"s":""}</span>
                {myTrades.length>0 && (
                  <button onClick={clearAll} style={{padding:"3px 8px",borderRadius:5,border:"1px solid #F8717140",background:"transparent",color:"#F87171",cursor:"pointer",fontSize:10}}>Clear all</button>
                )}
              </div>
            </div>

            {myTrades.length===0 ? (
              <div style={{textAlign:"center",color:"#333",padding:"28px 0",fontSize:12}}>
                No trades for {idx} yet — execute a trade above.
              </div>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,whiteSpace:"nowrap"}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid #21262D"}}>
                      {["#","Date","Price","Action","Units","Amount","Cash After","Equity After",""].map(h=>(
                        <th key={h} style={{textAlign:h==="#"?"center":"right",color:"#444",fontWeight:500,paddingBottom:6,paddingRight:h===""?0:8,fontSize:10}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {myTrades.map((t,i)=>(
                      <tr key={t.id} style={{borderBottom:"1px solid #21262D18"}}>
                        <td style={{textAlign:"center",padding:"6px 4px",color:"#444"}}>{i+1}</td>
                        <td style={{textAlign:"right",padding:"6px 8px 6px 0",color:"#666"}}>{t.date}</td>
                        <td style={{textAlign:"right",padding:"6px 8px 6px 0",color:"#E6EDF3"}}>${fmt(t.price)}</td>
                        <td style={{textAlign:"right",padding:"6px 8px 6px 0"}}>
                          <span style={{background:t.action==="BUY"?"#4ADE8022":"#F8717122",color:t.action==="BUY"?"#4ADE80":"#F87171",padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:700}}>{t.action}</span>
                        </td>
                        <td style={{textAlign:"right",padding:"6px 8px 6px 0",color:"#E6EDF3"}}>{fmt(t.units,4)}</td>
                        <td style={{textAlign:"right",padding:"6px 8px 6px 0",color:"#E6EDF3"}}>${fmt(t.amount)}</td>
                        <td style={{textAlign:"right",padding:"6px 8px 6px 0",color:"#888"}}>{fmtUSD(t.cashAfter)}</td>
                        <td style={{textAlign:"right",padding:"6px 8px 6px 0",color:"#888"}}>{fmtUSD(t.equityAfter)}</td>
                        <td style={{textAlign:"right",padding:"6px 0"}}>
                          <button onClick={()=>deleteTrade(t.id)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 4px"}}>×</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Footer */}
      <div style={{marginTop:14,textAlign:"center",fontSize:10,color:"#2D333B"}}>
        Price data via Stooq (end-of-day, delayed) · For educational backtesting only · Not financial advice
        · QQQ = Nasdaq-100 · SPY &amp; VOO = S&P 500 (price ~1/10 SPX index level) · URTH = MSCI World developed markets
        · Trades saved in browser localStorage
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
